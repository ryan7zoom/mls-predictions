name: Update MLS Predictions

# Runs automatically once a day, or manually anytime from the Actions tab
on:
  schedule:
    # Runs at 09:00 UTC every day. Adjust the cron value if you want a
    # different time - this is a common "morning" slot before match previews matter.
    - cron: '0 9 * * *'
  workflow_dispatch: {}  # this adds the "Run workflow" manual button in the Actions tab

# Needed so this workflow is allowed to push the generated docs/index.html back to the repo
permissions:
  contents: write

jobs:
  update-predictions:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run prediction script
        run: python predict.py

      - name: Commit and push updated predictions
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Update MLS predictions ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push
