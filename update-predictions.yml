name: update-predictions

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-predictions:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run prediction script
        run: python predict.py
        env:
          PREDICT_DEBUG: "1"

      - name: Commit and push updated predictions
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Update predictions"
          git push
